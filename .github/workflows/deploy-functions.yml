name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy website-analyzer --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy generate-calendar --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy generate-content --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-optimizer --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy proprietary-ai --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy proprietary-optimizer --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
